name: Bench

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid overlapping deploys; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  bench:
    name: Run benchmarks
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: bench
        run: cargo bench --bench solver

      - name: Add root redirect to report
        run: |
          echo '<!DOCTYPE html><meta http-equiv="refresh" content="0; url=report/">' \
            > target/criterion/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload report
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/criterion

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
